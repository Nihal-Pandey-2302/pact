[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "paris"          # Pharos testnet: avoid PUSH0/transient-storage assumptions
optimizer = true
optimizer_runs = 200
ffi = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false

# Pharos networks — RPCs read from env so we never commit endpoints/keys.
[rpc_endpoints]
pharos_atlantic = "${PHAROS_ATLANTIC_RPC}"
pharos_testnet = "${PHAROS_TESTNET_RPC}"
